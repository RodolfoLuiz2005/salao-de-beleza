<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Beauty Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="adm.css" />
    <script defer src="adm.js"></script>
</head>

<body>
   
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>Painel Administrativo</h2>

            <input type="password" id="adminPassword" placeholder="Digite a senha">

            <button id="loginBtn">
                Entrar
            </button>

            <p id="loginError"></p>
        </div>
    </div>


    <header class="adm-header">
        <nav>
            <h2>Painel <span>Administrativo</span></h2>
            <a href="index.html" class="btn-back"><i class="bi bi-arrow-left"></i> Voltar ao Salão</a>
        </nav>
    </header>

    <main class="adm-dashboard">
        <div class="dashboard-header">
            <div>
                <h1>Agendamentos Recentes</h1>
                <p>Acompanhe e gerencie os pedidos de horários dos clientes.</p>
            </div>
            <button id="clearBtn" class="btn-clear"><i class="bi bi-trash3"></i> Limpar Histórico</button>
        </div>

        <div id="appointmentsGrid" class="appointments-grid">
            <!-- Os cards de agendamento serão renderizados aqui pelo JS -->
        </div>
    </main>

</body>

</html>
